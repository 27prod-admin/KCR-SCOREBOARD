<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCR Pro Scoreboard - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --kl-orange: #f59e0b; --kl-azure: #00ffff; }
        body { background-color: #00FF00; font-family: 'Rajdhani', sans-serif; margin: 0; color: white; }
        body[data-view="control"] { background-color: #0a0a0a !important; }

        .view-section { display: none !important; }
        body[data-view="all"] .view-section { display: flex !important; flex-direction: column; min-height: 2000px; }
        body[data-view="scoreboard"] #section-scoreboard { display: flex !important; height: 100vh; width: 1920px; overflow: hidden; }
        body[data-view="control"] #section-control { display: flex !important; min-height: 100vh; width: 100%; padding: 15px; }

        .font-orbit { font-family: 'Orbitron', sans-serif; font-variant-numeric: tabular-nums; }
        .score-box { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border-bottom: 4px solid var(--kl-orange); position: relative; overflow: hidden; flex-shrink: 0; }
        
        .indicator-bar { transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: top; }
        .weapon-append { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0; }
        
        .weapon-btn { background: #222; border: 1px solid #444; padding: 10px 5px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #eee; }
        .weapon-btn:active { transform: scale(0.95); background: var(--kl-orange); color: black; }
        .btn-active { background: var(--kl-orange) !important; color: black !important; border-color: white !important; }
        .btn-pres { border-color: var(--kl-azure); color: var(--kl-azure); }
        .btn-pres-active { background: var(--kl-azure) !important; color: black !important; }

        .copy-box { background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); padding: 10px; border-radius: 10px; font-family: monospace; font-size: 10px; color: #aaa; word-break: break-all; }
    </style>
</head>
<body data-view="all">

    <!-- SCOREBOARD VIEW (Da usare su OBS) -->
    <div id="section-scoreboard" class="view-section items-center justify-center">
        <div class="relative flex items-center justify-center scale-[0.85] mt-[-50px]">
            
            <div id="append-A" class="hidden weapon-append flex flex-col items-end justify-center px-8 h-[90px] w-[300px] rounded-l-2xl -mr-1 animate-pulse shadow-2xl"></div>

            <div class="flex items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] z-50">
                <div class="score-box w-[420px] h-[90px] flex items-center px-8 rounded-l-2xl border-r border-white/5">
                    <div class="absolute left-0 top-0 bottom-0 w-2.5 flex flex-col gap-0.5 py-1.5">
                        <div id="led-wA" class="indicator-bar flex-1 bg-white shadow-[0_0_10px_white]"></div>
                        <div id="led-pA" class="indicator-bar flex-1 bg-[#00ffff] shadow-[0_0_10px_#00ffff]"></div>
                    </div>
                    <span id="txt-nameA" class="text-3xl font-black uppercase truncate flex-1 text-right mr-5 font-orbit">CASA</span>
                    <span id="txt-scoreA" class="text-7xl font-black text-orange-500 w-20 text-center font-orbit">0</span>
                </div>

                <div id="timer-block" class="bg-orange-500 w-[190px] h-[90px] flex flex-col items-center justify-center border-b-[6px] border-orange-700 flex-shrink-0 z-[100]">
                    <span id="txt-period" class="text-[10px] font-bold text-black/60 uppercase tracking-tighter mb-[-5px]">1° TEMPO</span>
                    <span id="txt-timer" class="text-6xl font-black text-black font-orbit">00:00</span>
                </div>

                <div class="score-box w-[420px] h-[90px] flex items-center px-8 rounded-r-2xl border-l border-white/5">
                    <span id="txt-scoreB" class="text-7xl font-black text-orange-500 w-20 text-center font-orbit">0</span>
                    <span id="txt-nameB" class="text-3xl font-black uppercase truncate flex-1 ml-5 font-orbit">OSPITI</span>
                    <div class="absolute right-0 top-0 bottom-0 w-2.5 flex flex-col gap-0.5 py-1.5">
                        <div id="led-wB" class="indicator-bar flex-1 bg-white shadow-[0_0_10px_white]"></div>
                        <div id="led-pB" class="indicator-bar flex-1 bg-[#00ffff] shadow-[0_0_10px_#00ffff]"></div>
                    </div>
                </div>
            </div>

            <div id="append-B" class="hidden weapon-append flex flex-col items-start justify-center px-8 h-[90px] w-[300px] rounded-r-2xl -ml-1 animate-pulse shadow-2xl"></div>
        </div>

        <div id="dice-box" class="hidden mt-10 animate-bounce flex flex-col items-center">
            <div id="dice-res" class="w-28 h-28 bg-white text-black text-6xl font-black rounded-3xl flex items-center justify-center border-4 border-orange-500 font-orbit">?</div>
            <span class="text-white font-bold text-sm mt-3 tracking-[0.2em] uppercase bg-black/40 px-4 py-1 rounded-full">Dado della Lega</span>
        </div>
    </div>

    <!-- CONTROLLER VIEW (Da usare sul Telefono) -->
    <div id="section-control" class="view-section flex-col items-center">
        <div class="bg-zinc-900 w-full max-w-2xl rounded-3xl p-6 border-t-8 border-orange-500 shadow-2xl space-y-6">
            
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <h1 class="text-2xl font-black text-orange-500 italic uppercase">Regia KCR Cloud</h1>
                <div id="sync-status" class="text-[8px] bg-red-500/20 text-red-500 px-2 py-1 rounded font-bold uppercase">Connecting...</div>
            </div>

            <!-- Box Link per il Telefono -->
            <div class="bg-white/5 p-4 rounded-xl space-y-2">
                <p class="text-[9px] uppercase font-bold text-gray-400">Link da inviare al telefono:</p>
                <div class="copy-box" id="display-url">Caricamento link...</div>
                <p class="text-[8px] italic text-gray-600">Apri questo link sul cellulare per usarlo come telecomando.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white/5 p-4 rounded-2xl space-y-3">
                    <input type="text" id="in-nameA" placeholder="TEAM CASA" class="w-full bg-black p-3 rounded-xl border border-white/10 text-white font-bold text-lg uppercase outline-none focus:border-orange-500">
                    <input type="text" id="in-starA" placeholder="STAR PLAYER A" class="w-full bg-black p-2 rounded-lg border border-orange-900/50 text-white text-xs uppercase outline-none">
                    <div class="flex gap-2">
                        <button onclick="cmdScore('A', -1)" class="bg-zinc-800 p-4 rounded-xl flex-1 font-bold">-1</button>
                        <button onclick="cmdScore('A', 1)" class="bg-orange-600 p-4 rounded-xl flex-[2] font-black uppercase text-xl">Goal</button>
                    </div>
                    <div class="grid grid-cols-2 gap-1.5">
                        <button onclick="cmdWeapon('A', 'GOL DOPPIO')" id="btn-w-A-GOL" class="weapon-btn">Gol Doppio</button>
                        <button onclick="cmdWeapon('A', 'SOSPENSIONE')" id="btn-w-A-SOS" class="weapon-btn">Sospens.</button>
                        <button onclick="cmdWeapon('A', 'STAR PLAYER')" id="btn-w-A-STA" class="weapon-btn">Star Player</button>
                        <button onclick="cmdPres('A')" id="btn-p-A" class="weapon-btn btn-pres">Presid.</button>
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-2xl space-y-3">
                    <input type="text" id="in-nameB" placeholder="TEAM OSPITI" class="w-full bg-black p-3 rounded-xl border border-white/10 text-white font-bold text-lg uppercase outline-none focus:border-orange-500">
                    <input type="text" id="in-starB" placeholder="STAR PLAYER B" class="w-full bg-black p-2 rounded-lg border border-orange-900/50 text-white text-xs uppercase outline-none">
                    <div class="flex gap-2">
                        <button onclick="cmdScore('B', -1)" class="bg-zinc-800 p-4 rounded-xl flex-1 font-bold">-1</button>
                        <button onclick="cmdScore('B', 1)" class="bg-orange-600 p-4 rounded-xl flex-[2] font-black uppercase text-xl">Goal</button>
                    </div>
                    <div class="grid grid-cols-2 gap-1.5">
                        <button onclick="cmdWeapon('B', 'GOL DOPPIO')" id="btn-w-B-GOL" class="weapon-btn">Gol Doppio</button>
                        <button onclick="cmdWeapon('B', 'SOSPENSIONE')" id="btn-w-B-SOS" class="weapon-btn">Sospens.</button>
                        <button onclick="cmdWeapon('B', 'STAR PLAYER')" id="btn-w-B-STA" class="weapon-btn">Star Player</button>
                        <button onclick="cmdPres('B')" id="btn-p-B" class="weapon-btn btn-pres">Presid.</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <button id="btn-timer" onclick="cmdToggleTimer()" class="w-full p-6 rounded-2xl font-black text-2xl uppercase border-b-8 bg-green-600 border-green-800">Avvia</button>
                    <div class="flex gap-2">
                        <button onclick="cmdResetTimer()" class="bg-zinc-800 p-2 rounded-lg flex-1 text-[10px] font-bold">RESET TEMPO</button>
                        <button onclick="cmdTogglePeriod()" class="bg-zinc-800 p-2 rounded-lg flex-1 text-[10px] font-bold">TEMPO</button>
                    </div>
                </div>
                <div class="space-y-2">
                    <button onclick="cmdRollDice()" class="w-full p-6 rounded-2xl font-black text-2xl uppercase border-b-8 bg-indigo-600 border-indigo-900">Dado</button>
                    <button onclick="cmdResetAll()" class="w-full bg-red-900/30 p-2 rounded-lg text-[10px] font-bold uppercase border border-red-500/30">Reset Risorse</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configurazione
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kcr-scoreboard-final';
        
        // DOCUMENT REFERENCE - 6 SEGMENTI (MANDATORIO)
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'match_sync', 'current_state');

        let state = {
            teamA: { name: "CASA", score: 0, starA: "", hasW: true, hasP: true },
            teamB: { name: "OSPITI", score: 0, starB: "", hasW: true, hasP: true },
            timer: 0, isRunning: false, period: "1° TEMPO",
            dice: { visible: false, res: "?" },
            weapons: {
                A: { name: "", timeLeft: 0, active: false, col: "bg-orange-500" },
                B: { name: "", timeLeft: 0, active: false, col: "bg-orange-500" }
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const view = urlParams.get('view') || 'control'; // Default a control se non specificato
        document.body.dataset.view = view;

        // Visualizza il link nel controller
        const urlDisplay = document.getElementById('display-url');
        if(urlDisplay) {
            const cleanUrl = window.location.href.split('?')[0];
            urlDisplay.innerText = cleanUrl + "?view=control";
        }

        async function start() {
            try {
                const userCredential = await signInAnonymously(auth);
                const syncStatus = document.getElementById('sync-status');
                if(syncStatus) { syncStatus.innerText = "Online"; syncStatus.className = "text-[8px] bg-green-500/20 text-green-500 px-2 py-1 rounded font-bold uppercase"; }
                
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        state = snap.data();
                        render();
                    }
                }, (err) => console.error("Firestore error:", err));
            } catch (e) {
                console.error("Auth error:", e);
            }
        }

        const save = () => {
            if(auth.currentUser) setDoc(docRef, state).catch(e => console.error("Save error:", e));
        };

        // Engine del Timer (Solo nella vista Scoreboard o All)
        setInterval(() => {
            if (state.isRunning && view !== 'control') {
                state.timer++;
                ['A', 'B'].forEach(t => {
                    if (state.weapons[t].active && state.weapons[t].timeLeft > 0) {
                        state.weapons[t].timeLeft--;
                    } else if (state.weapons[t].active && state.weapons[t].name !== "STAR PLAYER" && state.weapons[t].name !== "RIGORE PRES.") {
                        state.weapons[t].active = false;
                    }
                });
                render();
                if (state.timer % 3 === 0) save();
            }
        }, 1000);

        // Funzioni globali per i bottoni
        window.cmdScore = (t, v) => { state[`team${t}`].score = Math.max(0, state[`team${t}`].score + v); save(); };
        window.cmdToggleTimer = () => { state.isRunning = !state.isRunning; save(); };
        window.cmdResetTimer = () => { state.timer = 0; save(); };
        window.cmdTogglePeriod = () => { state.period = state.period.includes('1') ? '2° TEMPO' : '1° TEMPO'; save(); };
        window.cmdRollDice = () => {
            const o = ["1vs1", "2vs2", "3vs3", "4vs4", "5vs5", "6vs6"];
            state.dice = { visible: true, res: o[Math.floor(Math.random() * o.length)] };
            save();
            setTimeout(() => { state.dice.visible = false; save(); }, 8000);
        };

        window.cmdWeapon = (t, n) => {
            const w = state.weapons[t];
            if (w.active && w.name === n) { state.weapons[t].active = false; }
            else {
                let d = 60, col = "bg-orange-500 text-black";
                if (n === 'GOL DOPPIO') { d = 120; col = "bg-white text-black"; }
                if (n === 'SOSPENSIONE') { d = 240; col = "bg-white text-black"; }
                state[`team${t}`].hasW = false;
                state.weapons[t] = { name: n, timeLeft: d, active: true, col };
            }
            save();
        };

        window.cmdPres = (t) => {
            const w = state.weapons[t];
            if (w.active && w.name === "RIGORE PRES.") { state.weapons[t].active = false; }
            else {
                state[`team${t}`].hasP = false;
                state.weapons[t] = { name: "RIGORE PRES.", timeLeft: 60, active: true, col: "bg-cyan-400 text-black" };
            }
            save();
        };

        window.cmdResetAll = () => {
            state.teamA.hasW = state.teamA.hasP = state.teamB.hasW = state.teamB.hasP = true;
            state.weapons.A.active = state.weapons.B.active = false;
            save();
        };

        // Sync nomi input
        ['A', 'B'].forEach(t => {
            const inN = document.getElementById(`in-name${t}`);
            const inS = document.getElementById(`in-star${t}`);
            if (inN) inN.oninput = () => { state[`team${t}`].name = inN.value.toUpperCase(); save(); };
            if (inS) inS.oninput = () => { state[`team${t}`][`star${t}`] = inS.value.toUpperCase(); save(); };
        });

        function render() {
            const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            
            // Scoreboard update
            const setTxt = (id, v) => { const el = document.getElementById(id); if(el) el.innerText = v; };
            setTxt('txt-nameA', state.teamA.name || "CASA");
            setTxt('txt-nameB', state.teamB.name || "OSPITI");
            setTxt('txt-scoreA', state.teamA.score);
            setTxt('txt-scoreB', state.teamB.score);
            setTxt('txt-timer', fmt(state.timer));
            setTxt('txt-period', state.period);

            // LED Bars
            const setLed = (id, active) => { const el = document.getElementById(id); if(el) el.style.transform = active ? 'scaleY(1)' : 'scaleY(0)'; };
            setLed('led-wA', state.teamA.hasW); setLed('led-pA', state.teamA.hasP);
            setLed('led-wB', state.teamB.hasW); setLed('led-pB', state.teamB.hasP);

            // Appendices
            ['A', 'B'].forEach(t => {
                const w = state.weapons[t];
                const el = document.getElementById(`append-${t}`);
                if (el) {
                    if (w.active) {
                        el.classList.remove('hidden');
                        el.className = `weapon-append flex flex-col items-${t==='A'?'end':'start'} justify-center px-8 h-[90px] w-[300px] ${t==='A'?'rounded-l-2xl':'rounded-r-2xl'} animate-pulse shadow-2xl ${w.col}`;
                        el.innerHTML = `<span class="text-2xl font-black italic leading-none">${w.name}</span>` +
                            (w.name === 'STAR PLAYER' ? `<span class="text-sm font-bold opacity-70">${state['team'+t]['star'+t] || ''}</span>` : '') +
                            (w.timeLeft > 0 && w.name !== 'STAR PLAYER' && w.name !== 'RIGORE PRES.' ? `<span class="text-3xl font-bold font-mono mt-1">${fmt(w.timeLeft)}</span>` : '');
                    } else el.classList.add('hidden');
                }
            });

            // Dice
            const dBox = document.getElementById('dice-box');
            if(dBox) { dBox.classList.toggle('hidden', !state.dice.visible); setTxt('dice-res', state.dice.res); }

            // Sync controller UI
            const bT = document.getElementById('btn-timer');
            if(bT) {
                bT.innerText = state.isRunning ? "PAUSA" : "AVVIA";
                bT.className = `w-full p-6 rounded-2xl font-black text-2xl uppercase border-b-8 transition-all ${state.isRunning ? 'bg-red-600 border-red-900' : 'bg-green-600 border-green-800'}`;
            }

            if (view === 'control') {
                const highlight = (id, active) => { const el = document.getElementById(id); if(el) el.classList.toggle('btn-active', active); };
                const highlightPres = (id, active) => { const el = document.getElementById(id); if(el) el.classList.toggle('btn-pres-active', active); };
                highlight('btn-w-A-GOL', state.weapons.A.active && state.weapons.A.name==='GOL DOPPIO');
                highlight('btn-w-A-SOS', state.weapons.A.active && state.weapons.A.name==='SOSPENSIONE');
                highlight('btn-w-A-STA', state.weapons.A.active && state.weapons.A.name==='STAR PLAYER');
                highlightPres('btn-p-A', state.weapons.A.active && state.weapons.A.name==='RIGORE PRES.');
                
                highlight('btn-w-B-GOL', state.weapons.B.active && state.weapons.B.name==='GOL DOPPIO');
                highlight('btn-w-B-SOS', state.weapons.B.active && state.weapons.B.name==='SOSPENSIONE');
                highlight('btn-w-B-STA', state.weapons.B.active && state.weapons.B.name==='STAR PLAYER');
                highlightPres('btn-p-B', state.weapons.B.active && state.weapons.B.name==='RIGORE PRES.');

                const inNA = document.getElementById('in-nameA'); if(inNA && !inNA.matches(':focus')) inNA.value = state.teamA.name;
                const inNB = document.getElementById('in-nameB'); if(inNB && !inNB.matches(':focus')) inNB.value = state.teamB.name;
                const inSA = document.getElementById('in-starA'); if(inSA && !inSA.matches(':focus')) inSA.value = state.teamA.starA;
                const inSB = document.getElementById('in-starB'); if(inSB && !inSB.matches(':focus')) inSB.value = state.teamB.starB;
            }
        }

        start();
    </script>
</body>
</html>
